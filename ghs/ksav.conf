[rewrite_local]
# 去广告 — 请求头强制不走缓存（针对所有CloudFront域名）
^https?:\/\/.*\.cloudfront\.net\/.* url script-request-header https://raw.githubusercontent.com/89996462/Quantumult-X/main/ghs/ksav.js
# 去广告 — 响应体注入Hook脚本（针对所有CloudFront域名）
^https?:\/\/.*\.cloudfront\.net\/.* url script-response-body https://raw.githubusercontent.com/89996462/Quantumult-X/main/ghs/ksav.js
# 去广告 — 入口域名（支持所有jiekrrj相关域名）
^https?:\/\/.*\.jiekrrj\.cn\/.* url script-request-header https://raw.githubusercontent.com/89996462/Quantumult-X/main/ghs/ksav.js
^https?:\/\/.*\.jiekrrj\.cn\/.* url script-response-body https://raw.githubusercontent.com/89996462/Quantumult-X/main/ghs/ksav.js
# 广泛匹配：包含jiekrrj的任意域名
^https?:\/\/.*jiekrrj.*\/.* url script-request-header https://raw.githubusercontent.com/89996462/Quantumult-X/main/ghs/ksav.js
^https?:\/\/.*jiekrrj.*\/.* url script-response-body https://raw.githubusercontent.com/89996462/Quantumult-X/main/ghs/ksav.js
# 去广告 — 拦截事件追踪域名（转成本地空响应）
^https?:\/\/api-dc-prod-\d+\.cyou\/.* url reject-dict
^https?:\/\/api-dc2-prod-\d+\.cyou\/.* url reject-dict

[filter_local]
# 事件追踪 — 强制拒绝
host, api-dc-prod-008.cyou, reject
host, api-dc2-prod-08.cyou, reject
# 广告SDK（Butterfly通用）
host-suffix, eqfx9bas.cc, reject
host-suffix, yihaici.top, reject
host-suffix, yihaici.com, reject
host-suffix, epuf3tk.cc, reject
# 广告静态资源路径
host, d3k4e7spixznr4.cloudfront.net, reject
# 广告请求路径
host-suffix, cyou, reject

[mitm]
hostname = *.cloudfront.net, *.jiekrrj.cn, *.cyou, *.eqfx9bas.cc, *.yihaici.top, *.yihaici.com, *.epuf3tk.cc

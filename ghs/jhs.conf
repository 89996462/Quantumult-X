# === 去广告脚本 (两步: 删除缓存头 + 注入JS) ===
# script-request-header: 删除缓存头,强制200返回完整HTML
# script-response-body: 注入去广告JS到HTML
^https://d18v10algpi965\.cloudfront\.net/(frontPage|\?|$) url script-request-header https://raw.githubusercontent.com/89996462/Quantumult-X/main/ghs/jhs.js
^https://d18v10algpi965\.cloudfront\.net/(frontPage|\?|$) url script-response-body https://raw.githubusercontent.com/89996462/Quantumult-X/main/ghs/jhs.js



# 广告域名(eqfx9bas.cc等)使用随机子域名,改用filter HOST-SUFFIX拦截
[mitm]
hostname = d18v10algpi965.cloudfront.net, d35vb76r8ef604.cloudfront.net, d6qlr0f3xge2g.cloudfront.net, d3k4e7spixznr4.cloudfront.net, api-dc-prod-008.cyou, api-dc2-prod-08.cyou, jmnkojis4.com

# === 过滤规则: 拦截广告域名(随机子域名用HOST-SUFFIX,无需MITM) ===
[filter_local]

# === MITM: 匹配所有cloudfront子域名 ===
# 使用通配符 *.cloudfront.net 匹配所有子域名
[mitm]
hostname = *.cloudfront.net, api-dc-prod-008.cyou, api-dc2-prod-08.cyou, jmnkojis4.com, d6qlr0f3xge2g.cloudfront.net, d18v10algpi965.cloudfront.net, d3k4e7spixznr4.cloudfront.net

# === 过滤规则: 拦截广告域名(随机子域名用HOST-SUFFIX,无需MITM) ===
[filter_local]
# eqfx9bas广告SDK (随机子域名,无法逐一MITM)
HOST-SUFFIX,eqfx9bas.cc,reject
# yihaici赌博/广告页
HOST-SUFFIX,yihaici.top,reject
# epuf3tk广告跳转入口
HOST-SUFFIX,epuf3tk.cc,reject
# va2p.com世界杯狂欢广告域名
HOST-SUFFIX,va2p.com,reject
# 广告追踪上报 (所有域名+IP,URL正则匹配)
URL-REGEX,^https?:\/\/[^/]+\/api\/eventTracking\/batchReport\.json$,reject

# === 重写规则: HTML注入 + 具体域名reject ===
[rewrite_local]
# === 去广告脚本 (两步: 删除缓存头 + 注入JS) ===
# 只对HTML页面注入脚本，避免影响JS/CSS/图片等资源

# === 注入脚本到HTML页面 ===
# 支持所有cloudfront子域名 (app换了新域名 d6qlr0f3xge2g)
^https://[^/]*\.cloudfront\.net/$ url script-request-header https://raw.githubusercontent.com/89996462/Quantumult-X/main/ghs/jhs.js
^https://[^/]*\.cloudfront\.net/\?.* url script-request-header https://raw.githubusercontent.com/89996462/Quantumult-X/main/ghs/jhs.js
^https://[^/]*\.cloudfront\.net/frontPage.* url script-request-header https://raw.githubusercontent.com/89996462/Quantumult-X/main/ghs/jhs.js
# 其他HTML页面
^https://[^/]*\.cloudfront\.net/.*\.html url script-request-header https://raw.githubusercontent.com/89996462/Quantumult-X/main/ghs/jhs.js
^https://[^/]*\.cloudfront\.net/.*\? url script-request-header https://raw.githubusercontent.com/89996462/Quantumult-X/main/ghs/jhs.js
# 核心页面响应注入 (所有cloudfront子域名)
^https://[^/]*\.cloudfront\.net/\?.* url script-response-body https://raw.githubusercontent.com/89996462/Quantumult-X/main/ghs/jhs.js
^https://[^/]*\.cloudfront\.net/frontPage.* url script-response-body https://raw.githubusercontent.com/89996462/Quantumult-X/main/ghs/jhs.js
^https://[^/]*\.cloudfront\.net/$ url script-response-body https://raw.githubusercontent.com/89996462/Quantumult-X/main/ghs/jhs.js

# === 强制移除304缓存头的规则 (解决核心问题) ===
# 初始化JS请求 - 强制移除缓存头
^https://[^/]*\.cloudfront\.net/init\.js script-request-header https://raw.githubusercontent.com/89996462/Quantumult-X/main/ghs/jhs.js
# Web SDK请求 - 强制移除缓存头
^https://[^/]*\.cloudfront\.net/web-sdk.*\.js script-request-header https://raw.githubusercontent.com/89996462/Quantumult-X/main/ghs/jhs.js


# === 屏蔽开屏广告视频 ===
^https://[^/]*\.cloudfront\.net\/mp4\/splash- url reject

# === 屏蔽广告相关图片资源 ===
^https://[^/]*\.cloudfront\.net\/png\/ad-card-bg- url reject
^https://[^/]*\.cloudfront\.net\/png\/buyGold- url reject
^https://[^/]*\.cloudfront\.net\/gif\/worldCupLinks- url reject
^https://[^/]*\.cloudfront\.net\/png/ url reject
^https://[^/]*\.cloudfront\.net\/gif/ url reject
# 屏蔽非必要图片资源（提高性能）
^https://[^/]*\.cloudfront\.net\/images/.* url reject

# === 屏蔽广告HTML页面 (提高性能) ===
# 阻止后台加载广告页面，提高App打开速度
^https://.*\.eqfx9bas\.cc/.* url reject
^https://.*\.yihaici\.top/.* url reject
^https://.*\.epuf3tk\.cc/.* url reject
^https://.*\.va2p\.com/.* url reject

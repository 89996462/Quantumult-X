;--------------
; MITM
;--------------
[mitm]
hostname = api.einhn4.com

;--------------
; Rewrite - 全部路由到一体化脚本
;--------------
[rewrite_local]

# 广告+VIP+启动配置 -> 一体化脚本处理
^https?:\/\/api\.einhn4\.com\/v2\.5\/(ad\/space|popup\/activityInfo|panda\/popup|blindBox\/getOngoingActivities|demand_activity\/myRecordCounts|activityNavigations|vip\/(pricing|download|patent|getVipGiftPopup)|user\/(vipFrameGroup|wallet|oneLiveInfo)|deposit\/pricing|bootstrap) url script-response-body https://raw.githubusercontent.com/89996462/Quantumult-X/main/ycdz/one.js

# 广告CDN图片
^https?:\/\/jmt612\.syucp\.com\/storage\/commercial\/.* url reject
# 广告CDN视频 (仅拦截 /encry/ad/, 保留 /encry/vd/ 正常视频)
^https?:\/\/ysp612\.qozzh\.com\/encry\/ad\/.* url reject

